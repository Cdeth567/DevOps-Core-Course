---
# Docker role: install and configure Docker Engine
# Tags: docker (entire role), docker_install, docker_config

- name: Install Docker Engine
  block:
    - name: Remove old Docker packages if present
      ansible.builtin.apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent
        purge: true

    - name: Install Docker dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        update_cache: true

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present

  rescue:
    # GPG/network timeouts are common; wait and retry
    - name: Wait before retrying Docker install
      ansible.builtin.pause:
        seconds: 10

    - name: Retry adding Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Retry installing Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true

  always:
    - name: Ensure Docker service is enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

  become: true
  tags:
    - docker
    - docker_install

- name: Configure Docker
  block:
    - name: Create Docker daemon configuration directory
      ansible.builtin.file:
        path: /etc/docker
        state: directory
        mode: "0755"

    - name: Configure Docker daemon
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: "{{ docker_daemon_config | to_nice_json }}"
        mode: "0644"
      notify: restart docker

    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"

  rescue:
    - name: Log Docker configuration failure
      ansible.builtin.debug:
        msg: "Docker configuration failed. Rolling back daemon.json."

    - name: Remove invalid daemon config
      ansible.builtin.file:
        path: /etc/docker/daemon.json
        state: absent

  always:
    - name: Verify Docker is running after config
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

  become: true
  tags:
    - docker
    - docker_config
