---
# roles/web_app/tasks/main.yml
# Tags: web_app_wipe | app_deploy | compose

- name: Include wipe tasks
  ansible.builtin.include_tasks: wipe.yml
  tags:
    - web_app_wipe

- name: Deploy application with Docker Compose
  block:
    - name: Log in to Docker Hub
      community.docker.docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
        registry_url: "https://index.docker.io/v1/"
      no_log: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: "0755"

    - name: Template docker-compose.yml to application directory
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Pull latest image and bring up services
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        pull: policy
        state: present
        recreate: auto

    - name: Wait for application port to open
      ansible.builtin.wait_for:
        port: "{{ app_port }}"
        host: localhost
        delay: 5
        timeout: 60

    - name: Verify health endpoint
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}{{ health_endpoint }}"
        method: GET
        status_code: 200
      retries: 5
      delay: 5
      register: health_check
      until: health_check.status == 200

    - name: Log successful deployment
      ansible.builtin.debug:
        msg: "{{ app_name }} deployed successfully on {{ inventory_hostname }}:{{ app_port }}"

  rescue:
    - name: Show Docker Compose logs on failure
      ansible.builtin.command:
        cmd: docker compose -f {{ compose_project_dir }}/docker-compose.yml logs --tail=50
      register: compose_logs
      changed_when: false
      ignore_errors: true

    - name: Display logs for debugging
      ansible.builtin.debug:
        var: compose_logs.stdout_lines

    - name: Fail with helpful message
      ansible.builtin.fail:
        msg: >-
          Deployment of '{{ app_name }}' failed. See compose logs above.
          Verify image {{ docker_image }}:{{ docker_image_tag }} exists on Docker Hub.

  become: true
  tags:
    - app_deploy
    - compose
